name: run benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - 'plot_ci'

jobs:
  soa-benchmark:
    runs-on: cern-nextgen-h100
    container: registry.cern.ch/ngt-wp1.7/wp1.7-soa-benchmark:latest
    steps:
      - uses: actions/checkout@v4
      - name: build and compile
        run: |
          cmake -B ${{github.workspace}}/build
          cmake --build ${{github.workspace}}/build
      - name: run benchmarks
        run: |
          python3 plot.py ${{github.workspace}}/build
      - name: upload images
        uses: actions/upload-artifact@v4
        with:
          name: soa-benchmark-results
          path: ${{github.workspace}}/*.png
      - name: upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: soa-benchmark-raw-results
          path:  ${{github.workspace}}/build/*.json
